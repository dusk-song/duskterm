on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64：生成 NSIS .exe 安装包
          - name: Windows x64
            platform: windows-latest
            args: "--bundles nsis"

          # macOS Apple Silicon：M1 / M2 / M3 / M4
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"

          # macOS Intel
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"

          # Linux x64：生成 .deb + .AppImage
          - name: Linux x64
            platform: ubuntu-22.04
            args: "--bundles deb,appimage"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # 与你本地项目的 pnpm 主版本保持一致
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 固定 Node 22，避免 lts/* 自动切到新 Node 版本引入变量
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --force

      - name: Verify local Tauri CLI
        run: pnpm exec tauri --version

      - name: Build test packages
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: "-"
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "DuskTerm-[platform]-[arch]-[bundle]"
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false

      # 推送 v1.0.1 / v.1.0.1 等 Tag：正式创建 GitHub Release 草稿
      - name: Build and upload Release assets
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 无 Apple Developer 证书时使用 ad-hoc 签名；
          # 后续有 Developer ID 证书和公证时再替换。
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}

          releaseBody: |
            ## 下载说明
            - **Windows**：下载 `.exe` 安装包。
            - **macOS Apple Silicon**：适用于 M1、M2、M3、M4 等 Apple 芯片 Mac。
            - **macOS Intel**：适用于 Intel 芯片 Mac。
            - **Linux Debian / Ubuntu**：下载 `.deb`。
            - **其他 Linux 发行版**：下载 `.AppImage`，赋予执行权限后运行。
            ## 注意事项
            - macOS 首次打开未正式签名的应用时，可能需要在“系统设置 → 隐私与安全性”中手动允许。
            - Windows 未配置代码签名证书前，首次运行可能出现 SmartScreen 提示。

          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false

          # 当前暂未启用 Tauri 自动更新时关闭；
          # 后续接入 updater、签名密钥后再改为 true。
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false

          args: ${{ matrix.args }}
