<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuskTerm</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0a0c10;
      color: #f0f6fc;
      font-family: 'Consolas', 'Microsoft YaHei', monospace;
      font-size: 13px;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }
    #app { flex: 1; min-height: 0; overflow: hidden; }
    :root { --app-bg: #0a0c10; }

    #app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 12px;
    }
    #app-loading .loading-spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #0D9488;
      border-radius: 50%;
      animation: dusk-spin 0.6s linear infinite;
    }
    @keyframes dusk-spin { to { transform: rotate(360deg); } }
    #app-loading .loading-text {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
    }
  </style>
</head>

<body style="background: #0a0c10; margin: 0;">
  <div id="app">
    <div id="app-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">DuskTerm 正在启动…</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
